name: Build and deploy ASP.Net Core app to Azure Web App - contract-ai-backend

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.x'

      - name: Build with dotnet
        run: dotnet build backend/DocumentIntelligenceAPI/DocumentIntelligenceAPI.csproj --configuration Release

      - name: dotnet publish
        run: dotnet publish backend/DocumentIntelligenceAPI/DocumentIntelligenceAPI.csproj -c Release -o "${{env.DOTNET_ROOT}}/myapp"

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: .net-app
          path: ${{env.DOTNET_ROOT}}/myapp

  deploy:
    runs-on: windows-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: .net-app

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_7C8D4325ED714C21A56AAB0879C0C030 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_A128EEA9F32A4D3BBCE64E0BB9AC66F6 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_FF7050935C3C4899899DDDC4AE49103E }}

      - name: Set OpenAI API Key on App Service
        uses: azure/CLI@v1
        with:
          inlineScript: |
            az webapp config appsettings set --name contract-ai-backend --resource-group contract-ai-rg --settings OpenAI__ApiKey="${{ secrets.OPENAI_API_KEY }}"

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'contract-ai-backend'
          slot-name: 'Production'
          package: .
